name: refresh-payloads

# 대시보드 payload를 매일 새로 생성해 Cloudflare KV에 적재한다(planning: Cloudflare
# 무료 배포 Phase 3). Worker cron 대체 — Free Worker는 계산을 못 하므로 여기(GitHub
# 러너, 한도 없음)서 기존 Python 엔진을 돌려 모든 payload를 만들고 KV에 bulk put 한다.
on:
  schedule:
    # GitHub cron은 UTC. KST = UTC+9. 하루 4회(KST 04:30 / 09:00 / 15:30 / 22:30).
    # 매일 실행 — KST↔UTC 요일 경계 어긋남 방지 + 주말은 직전 종가 재서빙이라 무해.
    # 참고: GitHub 스케줄은 수 분~십수 분 지연될 수 있다(정시 슬롯일수록).
    - cron: "30 19 * * *"  # 04:30 KST (전일 19:30 UTC) — 美 마감 직전
    - cron: "0 0 * * *"    # 09:00 KST (00:00 UTC) — 美 종가 정착 후
    - cron: "30 6 * * *"   # 15:30 KST (06:30 UTC) — KOSPI 마감
    - cron: "30 13 * * *"  # 22:30 KST (13:30 UTC) — KOSPI 종가 정착 후
  workflow_dispatch: {}  # 수동 실행 버튼

concurrency:
  group: refresh-payloads
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      # dashboard.db(series_daily read-through 캐시 + scores_daily history)를 실행 간
      # 보존 → 매 실행 5년 재fetch 대신 당일 gap만 fetch(빠름) + Regime 점수-추세가
      # 누적된다. 키에 날짜를 넣어 매 실행 새 캐시를 저장(restore-keys로 직전 것 복원).
      - name: Restore data cache (dashboard.db)
        uses: actions/cache@v4
        with:
          path: dashboard.db
          key: dashboard-db-${{ github.run_id }}
          restore-keys: |
            dashboard-db-

      - name: Generate payloads
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # KRX_ID/KRX_PW는 미설정 → 국내 수급 팩터는 현행처럼 degrade(null).
        run: python scripts/generate_payloads.py --out kv_payloads.json

      - name: Upload payloads to Cloudflare KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx --yes wrangler@4 kv bulk put kv_payloads.json \
            --namespace-id 12dd9f0b4bba435db6e1ad0f43ab1b06 --remote

      - name: Upload payloads artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kv_payloads
          path: kv_payloads.json
          retention-days: 7
